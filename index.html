<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFC Card</title>
  <link rel="icon" href="./boy.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── DARK THEME (default) ── */
:root{
  --bg:#06090f;--card:#0d1117;--card2:#111820;
  --border:#1a2435;--border2:#243040;
  --accent:#38bdf8;--accent2:#6366f1;
  --text:#e2e8f0;--muted:#4a5a72;--muted2:#6b7e96;
  --info-bg:rgba(255,255,255,.025);--info-border:#1a2435;
  --hero-bg:linear-gradient(160deg,#0d1117 0%,#101822 100%);
  --grid-line:rgba(56,189,248,.04);
  --glow1:rgba(56,189,248,.05);--glow2:rgba(99,102,241,.07);
  --shadow:rgba(0,0,0,.7);
  --sans:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0f4f8;--card:#ffffff;--card2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --accent:#0284c7;--accent2:#4f46e5;
  --text:#0f172a;--muted:#94a3b8;--muted2:#64748b;
  --info-bg:rgba(0,0,0,.03);--info-border:#e2e8f0;
  --hero-bg:linear-gradient(160deg,#ffffff 0%,#f1f5f9 100%);
  --grid-line:rgba(2,132,199,.05);
  --glow1:rgba(2,132,199,.06);--glow2:rgba(79,70,229,.05);
  --shadow:rgba(0,0,0,.12);
}

html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(600px 600px at 20% 30%,var(--glow1) 0%,transparent 60%),
             radial-gradient(400px 400px at 80% 70%,var(--glow2) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

/* ── Theme Toggle ── */
.theme-btn{
  position:fixed;top:16px;right:16px;z-index:50;
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);
  background:var(--card);color:var(--muted2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
  box-shadow:0 2px 12px var(--shadow);
  transition:transform .2s,border-color .2s;
}
.theme-btn:hover{transform:scale(1.1);border-color:var(--accent);}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}
.card{direction:ltr;width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:28px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(56,189,248,.07),0 40px 100px var(--shadow);
  animation:rise .8s cubic-bezier(.22,1,.36,1) both;transition:background .3s,border-color .3s;}
@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.hero{position:relative;padding:36px 32px 28px;background:var(--hero-bg);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden;transition:background .3s;}
.hero::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;}
.hero::after{content:'';position:absolute;width:220px;height:220px;
  background:radial-gradient(circle,var(--glow1) 0%,transparent 70%);
  top:-40px;left:50%;transform:translateX(-50%);pointer-events:none;}

.avatar-ring{position:relative;z-index:1;width:110px;height:110px;border-radius:50%;padding:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));margin-bottom:16px;
  box-shadow:0 0 30px rgba(56,189,248,.25);}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:top center;display:block;border:2px solid var(--card);}
.avatar-placeholder{width:100%;height:100%;border-radius:50%;background:rgba(56,189,248,.15);display:flex;align-items:center;justify-content:center;border:2px solid var(--card);}
.status{position:absolute;bottom:6px;right:6px;width:18px;height:18px;background:#22c55e;border-radius:50%;border:3px solid var(--card);z-index:2;}
.status::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(34,197,94,.4);animation:ripple 2s infinite;}
@keyframes ripple{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.8)}}

.name{position:relative;z-index:1;font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1;color:var(--text);}
.role{position:relative;z-index:1;margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.08em;}
.tags{position:relative;z-index:1;display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center;direction:ltr;}
.tag{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;padding:4px 10px;border-radius:100px;
  border:1px solid rgba(56,189,248,.2);color:var(--accent);background:rgba(56,189,248,.07);}

/* ── Player ── */
.player{position:relative;z-index:1;margin-top:20px;width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border2);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
[data-theme="light"] .player{background:rgba(0,0,0,.04);}
.player-top{display:flex;align-items:center;gap:12px;}
.play-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 16px rgba(56,189,248,.35);transition:transform .15s;}
.play-btn:hover{transform:scale(1.08);}
.play-btn svg{width:18px;height:18px;fill:#fff;display:block;margin-left:2px;}
.track-info{flex:1;min-width:0;}
.track-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-artist{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px;}
.wave{display:flex;align-items:center;gap:2px;height:24px;flex-shrink:0;}
.wave-bar{width:3px;border-radius:2px;background:var(--accent);opacity:.4;}
.wave.active .wave-bar{animation:wavebar .8s ease-in-out infinite alternate;}
.wave-bar:nth-child(1){height:6px;animation-delay:.0s}.wave-bar:nth-child(2){height:14px;animation-delay:.1s}
.wave-bar:nth-child(3){height:20px;animation-delay:.2s}.wave-bar:nth-child(4){height:10px;animation-delay:.3s}
.wave-bar:nth-child(5){height:16px;animation-delay:.15s}.wave-bar:nth-child(6){height:8px;animation-delay:.25s}
.wave-bar:nth-child(7){height:18px;animation-delay:.05s}
@keyframes wavebar{from{transform:scaleY(.4);opacity:.4}to{transform:scaleY(1);opacity:1}}
.progress-wrap{display:flex;align-items:center;gap:10px;}
.prog-bar-bg{flex:1;height:4px;background:var(--border2);border-radius:4px;cursor:pointer;position:relative;}
.prog-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .3s linear;pointer-events:none;}
.prog-time{font-family:var(--mono);font-size:10px;color:var(--muted2);white-space:nowrap;}

/* ── Socials ── */
.socials{display:flex;gap:12px;justify-content:center;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--card2);flex-wrap:wrap;transition:background .3s;}
.soc-btn{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  text-decoration:none;border:1px solid var(--border2);transition:transform .2s,border-color .2s,box-shadow .2s;}
.soc-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.25);}
.soc-btn svg{display:block;width:22px;height:22px;}
.soc-tg{background:rgba(41,182,246,.1);border-color:rgba(41,182,246,.25);}.soc-tg:hover{border-color:rgba(41,182,246,.6);}
.soc-ig{background:rgba(225,48,108,.1);border-color:rgba(225,48,108,.25);}.soc-ig:hover{border-color:rgba(225,48,108,.6);}
.soc-wa{background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.25);}.soc-wa:hover{border-color:rgba(37,211,102,.6);}
.soc-gh{background:rgba(100,110,120,.1);border-color:rgba(100,110,120,.25);}.soc-gh:hover{border-color:rgba(100,110,120,.5);}
.soc-li{background:rgba(10,102,194,.12);border-color:rgba(10,102,194,.35);}.soc-li:hover{border-color:rgba(10,102,194,.7);}
.soc-yt{background:rgba(255,0,0,.1);border-color:rgba(255,0,0,.25);}.soc-yt:hover{border-color:rgba(255,0,0,.6);}
.soc-tw{background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.15);}.soc-tw:hover{border-color:rgba(0,0,0,.4);}
[data-theme="light"] .soc-gh{background:rgba(30,40,50,.08);border-color:rgba(30,40,50,.2);}
[data-theme="light"] .soc-tw{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.15);}

/* ── Info rows ── */
.infos{padding:20px 24px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);}
.info-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;
  background:var(--info-bg);border:1px solid var(--info-border);text-decoration:none;color:var(--text);
  transition:background .2s,border-color .2s;}
.info-row:hover{background:rgba(56,189,248,.06);border-color:rgba(56,189,248,.25);}
.info-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.info-icon svg{width:18px;height:18px;display:block;}
.info-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;}
.info-value{font-size:14px;font-weight:500;direction:ltr;text-align:left;}
.ic-phone{background:rgba(34,197,94,.1);color:#22c55e;}
.ic-mail{background:rgba(249,115,22,.1);color:#f97316;}
.ic-loc{background:rgba(168,85,247,.1);color:#a855f7;}

/* ── Save btn ── */
.btn-save{margin:20px 24px 24px;display:block;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 24px rgba(56,189,248,.3);transition:transform .2s,box-shadow .2s;width:calc(100% - 48px);}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(56,189,248,.4);}
.btn-save-inner{display:flex;align-items:center;justify-content:center;gap:10px;}

/* ── Footer ── */
.foot{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.foot-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.foot-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.5;}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;gap:12px;font-family:var(--mono);font-size:13px;color:var(--muted2);}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:480px){
  .page{padding:16px 10px;}
  .card{border-radius:22px;}
  .hero{padding:28px 20px 20px;}
  .avatar-ring{width:90px;height:90px;}
  .name{font-size:22px;}
  .role{font-size:10px;}
  .tag{font-size:9px;padding:3px 8px;}
  .socials{padding:16px 20px;gap:10px;}
  .soc-btn{width:44px;height:44px;border-radius:12px;}
  .soc-btn svg{width:19px;height:19px;}
  .infos{padding:14px 16px;gap:8px;}
  .info-row{padding:10px 12px;gap:10px;}
  .info-icon{width:32px;height:32px;border-radius:8px;}
  .info-icon svg{width:16px;height:16px;}
  .info-value{font-size:13px;}
  .btn-save{margin:14px 16px 18px;width:calc(100% - 32px);padding:14px;font-size:14px;}
  .foot{padding:12px 16px;}
  .player{padding:10px 12px;}
  .play-btn{width:38px;height:38px;}
  .play-btn svg{width:15px;height:15px;}
  .track-name{font-size:12px;}
  .theme-btn{top:10px;right:10px;width:34px;height:34px;font-size:16px;}
}
@media(max-width:360px){
  .name{font-size:19px;}
  .avatar-ring{width:80px;height:80px;}
  .soc-btn{width:40px;height:40px;}
}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="تغییر تم">🌙</button>
<div class="page">
  <div class="card" id="card">
    <div class="loading"><div class="spin"></div> Loading...</div>
  </div>
</div>
<script>
// ── Theme ──
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem('nfc_theme', next);
}
(function initTheme(){
  const saved = localStorage.getItem('nfc_theme') || 'dark';
  if(saved === 'light') document.documentElement.setAttribute('data-theme','light');
  document.addEventListener('DOMContentLoaded',()=>{
    const btn = document.getElementById('themeBtn');
    if(btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
  });
})();

async function loadCard() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const d = await res.json();
    renderCard(d);
  } catch(e) {
    document.getElementById('card').innerHTML = '<div class="loading">خطا در بارگذاری اطلاعات</div>';
  }
}

function fmt(s){const m=Math.floor(s/60);return m+':'+(Math.floor(s%60)+'').padStart(2,'0');}

  github: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>`,
  linkedin: `<svg viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
  youtube:  `<svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
  twitter:  `<svg viewBox="0 0 24 24" fill="#94a3b8"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.727-8.836L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
};

function renderCard(d) {
  const nameParts = (d.name||'').trim().split(' ');
  const nameFirst = nameParts.slice(0,-1).join(' ') || nameParts[0];
  const nameLast  = nameParts.length > 1 ? nameParts[nameParts.length-1] : '';

  const avatarHTML = d.photo
    ? `<img src="${d.photo}" alt="${d.name}"/>`
    : `<div class="avatar-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;

  const tagsHTML = (d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  const playerHTML = d.showMusic && d.music ? `
    <div class="player">
      <div class="player-top">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <div class="track-info">
          <div class="track-name">${d.trackName||'Track'}</div>
          <div class="track-artist">${d.trackArtist||''}</div>
        </div>
        <div class="wave" id="wave">
          ${[...Array(7)].map(()=>'<div class="wave-bar"></div>').join('')}
        </div>
      </div>
      <div class="progress-wrap">
        <span class="prog-time" id="curTime">0:00</span>
        <div class="prog-bar-bg" id="progBg" onclick="seek(event)"><div class="prog-bar-fill" id="progFill"></div></div>
        <span class="prog-time" id="durTime">0:00</span>
      </div>
    </div>
    <audio id="audio" preload="auto"><source src="${d.music}" type="audio/mpeg"/></audio>` : '';

  // GitHub icon color adapts to theme
  const ghColor = document.documentElement.getAttribute('data-theme') === 'light' ? '#1a1a2e' : '#C9D1D9';

  const socials = [];
  if(d.telegram)  socials.push(`<a class="soc-btn soc-tg" href="https://t.me/${d.telegram}" target="_blank">${ICONS.telegram}</a>`);
  if(d.instagram) socials.push(`<a class="soc-btn soc-ig" href="https://instagram.com/${d.instagram}" target="_blank">${ICONS.instagram}</a>`);
  if(d.whatsapp)  socials.push(`<a class="soc-btn soc-wa" href="https://wa.me/${d.whatsapp.replace(/[^0-9]/g,'')}" target="_blank">${ICONS.whatsapp}</a>`);
  if(d.linkedin)  socials.push(`<a class="soc-btn soc-li" href="https://linkedin.com/in/${d.linkedin}" target="_blank">${ICONS.linkedin}</a>`);
  if(d.github)    socials.push(`<a class="soc-btn soc-gh" href="https://github.com/${d.github}" target="_blank" style="color:${ghColor}">${ICONS.github}</a>`);
  if(d.youtube)   socials.push(`<a class="soc-btn soc-yt" href="https://youtube.com/@${d.youtube}" target="_blank">${ICONS.youtube}</a>`);
  if(d.twitter)   socials.push(`<a class="soc-btn soc-tw" href="https://x.com/${d.twitter}" target="_blank">${ICONS.twitter}</a>`);

  const infoRows = [];
  if(d.phone) infoRows.push(`<a class="info-row" href="tel:${d.phone}"><div class="info-icon ic-phone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .99h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16z"/></svg></div><div><div class="info-label">Contact</div><div class="info-value">${d.phone}</div></div></a>`);
  if(d.showEmail && d.email) infoRows.push(`<a class="info-row" href="mailto:${d.email}"><div class="info-icon ic-mail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div><div><div class="info-label">Email</div><div class="info-value">${d.email}</div></div></a>`);
  if(d.showLocation && d.location) infoRows.push(`<div class="info-row" style="cursor:default"><div class="info-icon ic-loc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div><div class="info-label">Location</div><div class="info-value">${d.location}</div></div></div>`);

  const vcardLines = ['BEGIN:VCARD','VERSION:3.0',`FN:${d.name}`,`N:${nameLast};${nameFirst};;;`,`TITLE:${d.job}`,`TEL;TYPE=CELL:${d.phone}`,`EMAIL:${d.email}`,`ADR;TYPE=HOME:;;${d.location};;;;`];
  if(d.github)    vcardLines.push(`URL:https://github.com/${d.github}`);
  if(d.linkedin)  vcardLines.push(`URL;type=LinkedIn:https://linkedin.com/in/${d.linkedin}`);
  if(d.telegram)  vcardLines.push(`X-SOCIALPROFILE;type=telegram:https://t.me/${d.telegram}`);
  if(d.instagram) vcardLines.push(`X-SOCIALPROFILE;type=instagram:https://instagram.com/${d.instagram}`);
  vcardLines.push('END:VCARD');

  const saveBtn = d.showVcard ? `<button class="btn-save" onclick="saveContact()"><div class="btn-save-inner"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>افزودن به مخاطبین</div></button>` : '';

  document.getElementById('card').innerHTML = `
  <div class="hero">
    <div class="avatar-ring">${avatarHTML}<div class="status"></div></div>
    <h1 class="name">${nameFirst} ${nameLast}</h1>
    <p class="role">${d.job}</p>
    <div class="tags">${tagsHTML}</div>
    ${playerHTML}
  </div>
  ${socials.length ? `<div class="socials">${socials.join('')}</div>` : ''}
  <div class="infos">${infoRows.join('')}</div>
  ${saveBtn}
  <div class="foot"><span class="foot-label">NFC Digital Card</span><div class="foot-dot"></div><span class="foot-label" style="font-family:var(--sans);font-size:11px;color:var(--muted2)">© 2026 MOHAMMAD AMIN</span></div>
  `;

  window._vcardData = vcardLines.join('\n');
  window._cardName  = d.name;

  if(d.showMusic && d.music){
    const audio=document.getElementById('audio'),
          playIcon=document.getElementById('playIcon'),
          wave=document.getElementById('wave'),
          progFill=document.getElementById('progFill'),
          progBg=document.getElementById('progBg'),
          curTime=document.getElementById('curTime'),
          durTime=document.getElementById('durTime');
    const PLAY='<polygon points="5,3 19,12 5,21"/>',
          PAUSE='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    audio.addEventListener('loadedmetadata',()=>{durTime.textContent=fmt(audio.duration);});
    audio.addEventListener('timeupdate',()=>{if(!audio.duration)return;progFill.style.width=(audio.currentTime/audio.duration*100)+'%';curTime.textContent=fmt(audio.currentTime);});
    audio.addEventListener('ended',()=>{playIcon.innerHTML=PLAY;wave.classList.remove('active');progFill.style.width='0%';curTime.textContent='0:00';});
    window.togglePlay=function(){if(audio.paused){audio.play();playIcon.innerHTML=PAUSE;wave.classList.add('active');}else{audio.pause();playIcon.innerHTML=PLAY;wave.classList.remove('active');}};
    window.seek=function(e){const r=progBg.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;};
  }
}

window.saveContact=function(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([window._vcardData||''],{type:'text/vcard'}));
  a.download=(window._cardName||'contact').replace(/ /g,'_')+'.vcf';
  a.click();
};

loadCard();
</script>
</body>
</html>
